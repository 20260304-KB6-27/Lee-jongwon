<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //var

      //let 일반적인 변수
      //const 상수(값이 변경되면 안될때 사용)

      let date = new Date();

      let month = date.getMonth() + 1;

      if (3 <= month && month < 6) {
        alert('봄입니다.');
      } else if (6 <= month && month < 9) {
        alert('여름입니다.');
      } else if (9 <= month && month < 12) {
        alert('가을입니다.');
      } else {
        alert('겨울입니다.');
      }
      alert(month);
    </script>
  </head>
  <body></body>
</html>
