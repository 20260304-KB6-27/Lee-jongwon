<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callTimes(callback, count) {
        for (let i = 0; i < count; i++);
        {
          callback();
        }
      }

      callTimes(function () {
        alert('함수호출');
      }, 3);
    </script>
  </head>

  <body></body>
</html>
